version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nightwatch
      POSTGRES_PASSWORD: nightwatch
      POSTGRES_DB: nightwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nightwatch:nightwatch@db:5432/nightwatch
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  pgdata: